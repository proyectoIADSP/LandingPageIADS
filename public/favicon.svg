      d="M80 62c3.5-13.5-2-26-11.5-36-1 9-5 15.5-11.5 19.5C66.5 47.5 74.5 54 80 62z"
      fill="#B58E33"
    />
    <!-- Biblia abierta -->
    <path
      d="M28 66c12.5 5 26 8.5 36 8.5S87.5 71 100 66v11c-12.5 6-26 10.5-36 10.5S40.5 83 28 77V66z"
      fill="#003B5C"
    />
    <!-- Cruz -->
    <path
      d="M64 56v30"
      stroke="#FFFFFF"
      stroke-width="3.5"
      stroke-linecap="round"
    />
    <path
      d="M56 70h16"
